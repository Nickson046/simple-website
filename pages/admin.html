<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header>

<div class="logo">⛽ RedFuel Admin</div>

<nav class="main-nav">
<a href="../index.html">Home</a>
<a href="prices.html">Fuel Prices</a>
</nav>

</header>

<section>

<h2>Fuel Price Admin Panel</h2>

<form id="priceForm">

<input type="number" step="0.01" id="petrolInput" placeholder="Petrol Price">

<input type="number" step="0.01" id="dieselInput" placeholder="Diesel Price">

<button type="submit">Update Prices</button>

</form>

</section>

<!--This section is for posting updates -->
<section>

<h2>Post Station News</h2>

<input type="text" id="newsTitle" placeholder="News Title">

<input type="text" id="newsImage" placeholder="Image URL">

<textarea id="newsText" placeholder="Write update"></textarea>

<button onclick="postNews()">Publish</button>

</section>

<footer>
<p>© 2026 RedFuel Smart Station</p>
</footer>

<script>

document.getElementById("priceForm").addEventListener("submit", function(e){

e.preventDefault();

const petrol = document.getElementById("petrolInput").value;
const diesel = document.getElementById("dieselInput").value;

localStorage.setItem("petrol", petrol);
localStorage.setItem("diesel", diesel);

alert("Fuel prices updated!");

});

</script>

<script>

function postNews(){

const title = document.getElementById("newsTitle").value;
const image = document.getElementById("newsImage").value;
const text = document.getElementById("newsText").value;

let news = JSON.parse(localStorage.getItem("stationNews")) || [];

news.push({title,image,text});

localStorage.setItem("stationNews",JSON.stringify(news));

alert("News published!");

}

</script>

<script src="js/script.js"></script>
<script src="../js/theme.js"></script>

</body>
</html>
