<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header>

<div class="logo">⛽ RedFuel Admin</div>

<nav class="main-nav">
<a href="../index.html">Home</a>
<a href="prices.html">Fuel Prices</a>
</nav>

</header>


<!-- ===============================
FUEL PRICE ADMIN
================================ -->
<section>

<h2>Fuel Price Admin Panel</h2>

<form id="priceForm">

<input 
type="number" 
step="0.01" 
id="petrolInput" 
placeholder="Petrol Price"
required>

<input 
type="number" 
step="0.01" 
id="dieselInput" 
placeholder="Diesel Price"
required>

<button type="submit">Update Prices</button>

</form>

</section>


<!-- ===============================
POST STATION NEWS
================================ -->
<section>

<h2>Post Station News</h2>

<input 
type="text" 
id="newsTitle" 
placeholder="News Title"
required>

<input 
type="text" 
id="newsImage" 
placeholder="Image URL"
required>

<textarea 
id="newsText" 
placeholder="Write update"
required></textarea>

<button onclick="postNews()">Publish</button>

</section>


<footer>
<p>© 2026 RedFuel Smart Station</p>
</footer>


<!-- Existing scripts -->
<script src="js/script.js"></script>
<script src="../js/theme.js"></script>

<!-- Firebase Admin Logic -->
<script type="module" src="../js/admin.js"></script>

</body>
</html>
