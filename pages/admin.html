FUEL PRICE ADMIN
================================ -->
<section>

<h2>Fuel Price Admin Panel</h2>

<form id="priceForm">

<input 
type="number" 
step="0.01" 
id="petrolInput" 
placeholder="Petrol Price"
required>

<input 
type="number" 
step="0.01" 
id="dieselInput" 
placeholder="Diesel Price"
required>

<button type="submit">Update Prices</button>

</form>

</section>

POST STATION NEWS
================================ -->
<section>

<input 
type="text" 
id="newsTitle" 
placeholder="News Title"

<input 
type="text" 
id="newsImage" 
placeholder="Image URL"
required>

<textarea 
id="newsText" 
placeholder="Write update"
required></textarea>

<button onclick="postNews()">Publish</button>

</section>
